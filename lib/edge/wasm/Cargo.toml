[package]
name = "qdrant-edge-wasm"
version = "0.1.0"
authors = ["Qdrant Team <info@qdrant.tech>"]
license = "Apache-2.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
common = { path = "../../common/common" }
edge = { path = "../../edge" }
shard = { path = "../../shard" }
segment = { path = "../../segment", default-features = false }

serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
uuid = { version = "1.0", features = ["v4"] }
log = "0.4"
console_log = "1.0"
getrandom = { version = "0.2", features = ["js"] }
console_error_panic_hook = "0.1.7"

[profile.release]
opt-level = 's'     # Use 's' for a balance of size and performance
lto = false          # Keep LTO off for consistent building
codegen-units = 1   # Single unit for better LTO
panic = 'abort'     # Remove stack unwinding code
strip = false        # Keep symbols for now
incremental = false # Disable incremental for cleaner build

[patch.crates-io]
# If we need any patches for wasm32-wasip1
