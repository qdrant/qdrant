name: Qdrant Edge Tests

on:
  push:
    branches: [ master, dev ]
  pull_request:
    branches: [ '**' ]

jobs:
  edge-py-test:
    name: Test Python bindings

    runs-on: ubuntu-latest

    services:
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
          - 6334:6334

    steps:
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install mold
        uses: rui314/setup-mold@v1

      - name: Enable mold
        run: |
          mkdir .cargo

          cat >.cargo/config.toml <<-EOF
          [target.x86_64-unknown-linux-gnu]
          linker = "clang"
          rustflags = ["-C", "link-arg=-fuse-ld=/usr/local/bin/mold"]
          EOF

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install maturin
        run: pip install maturin

      - name: Checkout Qdrant
        uses: actions/checkout@v6

      - name: Restore Rust build cache
        uses: Swatinem/rust-cache@v2

      - name: Build Qdrant Edge
        run: |
          cd lib/edge/python

          python -m venv .venv
          source .venv/bin/activate

          pip install requests
          maturin develop --no-default-features --features abi3

      - name: Wait for Qdrant
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:6333/ >/dev/null; then
              echo "Qdrant is up"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Qdrant did not start in time"
              exit 1
            fi
            sleep 1
          done

      - name: Run all Python example scripts
        run: |
          cd lib/edge/python

          source .venv/bin/activate

          for f in examples/*.py; do
            base=$(basename "$f")
            if [ "$base" = "__init__.py" ]; then
              continue
            fi
            # Requires collection "test" with specific segment state; skip in CI
            if [ "$base" = "download_partial.py" ]; then
              echo "Skipping $f (needs pre-populated collection)"
              continue
            fi
            echo "Running example: $f"
            python "$f"
          done
