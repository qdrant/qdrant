name: Qdrant Edge Rust Package

on:
  push:
    branches: [ master, dev ]
  pull_request:
    branches: [ '**' ]

jobs:
  edge-rust-package:
    name: Test Qdrant Edge Rust Package

    runs-on: ubuntu-latest

    steps:
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install mold
        uses: rui314/setup-mold@v1

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install ast-grep
        run: npm install --global @ast-grep/cli

      - name: Checkout Qdrant
        uses: actions/checkout@v6

      - name: Restore Rust build cache
        uses: Swatinem/rust-cache@v2

      - name: Amalgamate
        run: lib/edge/publish/amalgamate.py

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Prepare facet_test snapshot
        working-directory: lib/edge/publish
        run: examples/prepare_facet_snapshot.sh

      - name: Build and run Rust example binaries
        working-directory: lib/edge/publish
        run: |
          cargo build -p examples --release
          for bin in examples/src/bin/*.rs; do
            name=$(basename "$bin" .rs)
            echo "Running example: $name"
            cargo run -p examples --release --bin "$name"
          done
