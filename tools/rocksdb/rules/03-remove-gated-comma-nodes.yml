id: remove-rocksdb-gated-comma-nodes
language: rust
utils:
  comma-node:
    any:
      - kind: enum_variant
      - kind: field_declaration
      - kind: field_initializer
      - kind: parameter
      - all:
          - any:
              - kind: identifier
              - kind: reference_expression
              - kind: scoped_identifier
          - any:
              - inside:
                  kind: arguments
                  stopBy: end
              - inside:
                  kind: array_expression
                  stopBy: end
rule:
  all:
    - matches: comma-node
    - follows:
        kind: attribute_item
        stopBy: neighbor
    - follows:
        pattern: '#[cfg(feature = "rocksdb")]'
        stopBy:
          not:
            kind: attribute_item
fix:
  template: ""
  expandStart:
    pattern: '#[cfg(feature = "rocksdb")]'
    stopBy: end
  expandEnd:
    regex: ','
