id: remove-rocksdb-gated-blocks
language: rust
utils:
  comma-node:
    any:
      - kind: enum_variant
      - kind: field_declaration
      - kind: field_initializer
      - kind: parameter
      - all:
          - any:
              - kind: identifier
              - kind: reference_expression
              - kind: scoped_identifier
          - any:
              - inside:
                  kind: arguments
                  stopBy: end
              - inside:
                  kind: array_expression
                  stopBy: end
  cfg-following-node:
    not:
      kind: attribute_item
rule:
  all:
    - pattern: '#[cfg(feature = "rocksdb")]'
    - not:
        inside:
          kind: field_initializer
          stopBy: end
    - not:
        inside:
          kind: match_arm
          stopBy: end
    - not:
        precedes:
          matches: comma-node
          stopBy: end
    - precedes:
        matches: cfg-following-node
        stopBy: end
fix:
  template: ""
  expandEnd:
    matches: cfg-following-node
    stopBy:
      not:
        kind: attribute_item
